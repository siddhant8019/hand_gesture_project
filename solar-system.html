<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hand Gesture Project — Solar System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #000;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: #fff;
}

canvas { display: block; }

/* ─── HUD OVERLAY ──────────────────────────────────────── */

#hud {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

#hud::before, #hud::after {
  content: '';
  position: absolute;
  width: 80px; height: 80px;
  border: 2px solid rgba(0,200,255,0.15);
}
#hud::before { top: 20px; left: 20px; border-right: none; border-bottom: none; }
#hud::after { top: 20px; right: 20px; border-left: none; border-bottom: none; }

.corner-bl, .corner-br {
  position: absolute;
  width: 80px; height: 80px;
  border: 2px solid rgba(0,200,255,0.15);
}
.corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
.corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

#scanline {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.15), transparent);
  animation: scanDown 4s linear infinite;
  z-index: 11;
  pointer-events: none;
}
@keyframes scanDown {
  0% { top: 0; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

#top-bar {
  position: absolute;
  top: 20px;
  left: 110px;
  right: 110px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

#system-id {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  color: rgba(0,200,255,0.5);
  letter-spacing: 4px;
  text-transform: uppercase;
}

#jarvis-title { text-align: center; flex: 1; }

#jarvis-title h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 12px;
  font-weight: 700;
  color: rgba(0,200,255,0.7);
  text-shadow: 0 0 20px rgba(0,200,255,0.3);
}

#jarvis-title .sub {
  font-size: 0.55rem;
  color: rgba(0,200,255,0.3);
  letter-spacing: 6px;
  margin-top: 2px;
}

#time-display {
  font-size: 0.6rem;
  color: rgba(0,200,255,0.4);
  letter-spacing: 2px;
  text-align: right;
}

#jarvis-status {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

#jarvis-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  color: rgba(0,200,255,0.8);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(0,200,255,0.4);
  min-height: 1.2em;
}

#jarvis-sub {
  font-size: 0.55rem;
  color: rgba(0,200,255,0.3);
  letter-spacing: 2px;
  margin-top: 4px;
}

#arc-reactor {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 60px;
}

#arc-reactor .ring {
  position: absolute;
  border: 1px solid rgba(0,200,255,0.12);
  border-radius: 50%;
}

#arc-reactor .ring-1 { width: 60px; height: 60px; top: 0; left: 0; animation: spinSlow 12s linear infinite; }
#arc-reactor .ring-2 { width: 44px; height: 44px; top: 8px; left: 8px; animation: spinSlow 8s linear infinite reverse; border-style: dashed; }
#arc-reactor .ring-3 { width: 28px; height: 28px; top: 16px; left: 16px; animation: spinSlow 5s linear infinite; }
#arc-reactor .core { position: absolute; width: 8px; height: 8px; top: 26px; left: 26px; background: rgba(0,200,255,0.3); border-radius: 50%; box-shadow: 0 0 15px rgba(0,200,255,0.4); }

@keyframes spinSlow { to { transform: rotate(360deg); } }

#target-brackets {
  position: absolute;
  width: 60px; height: 60px;
  pointer-events: none;
  display: none;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s;
}

#target-brackets .tb { position: absolute; width: 12px; height: 12px; }
#target-brackets .tb-tl { top: 0; left: 0; border-top: 2px solid rgba(0,200,255,0.7); border-left: 2px solid rgba(0,200,255,0.7); }
#target-brackets .tb-tr { top: 0; right: 0; border-top: 2px solid rgba(0,200,255,0.7); border-right: 2px solid rgba(0,200,255,0.7); }
#target-brackets .tb-bl { bottom: 0; left: 0; border-bottom: 2px solid rgba(0,200,255,0.7); border-left: 2px solid rgba(0,200,255,0.7); }
#target-brackets .tb-br { bottom: 0; right: 0; border-bottom: 2px solid rgba(0,200,255,0.7); border-right: 2px solid rgba(0,200,255,0.7); }

#target-brackets.locked .tb { border-color: rgba(0,255,150,0.8); }
#target-brackets .target-label {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: rgba(0,200,255,0.8);
  letter-spacing: 2px;
  white-space: nowrap;
  text-shadow: 0 0 8px rgba(0,200,255,0.3);
}

#target-brackets.locked .target-label { color: rgba(0,255,150,0.9); }

#target-brackets .target-dist {
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.5rem;
  color: rgba(0,200,255,0.4);
  letter-spacing: 1px;
  white-space: nowrap;
}

#crosshair {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(0,200,255,0.6);
  box-shadow: 0 0 12px rgba(0,200,255,0.4), 0 0 30px rgba(0,200,255,0.15);
  pointer-events: none;
  display: none;
  transform: translate(-50%, -50%);
}

#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(0,200,255,0.2);
}
#crosshair::before { width: 30px; height: 1px; top: 2.5px; left: -12px; }
#crosshair::after { width: 1px; height: 30px; top: -12px; left: 2.5px; }

#info-panel {
  position: absolute;
  right: 30px;

  transform: translateY(-50%);

  background: rgba(0,10,20,0.75);

  border-radius: 2px;

  display: none;

  max-height: 80vh;

  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
}

#info-panel::-webkit-scrollbar { width: 2px; }
#info-panel::-webkit-scrollbar-track { background: transparent; }
#info-panel::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); }

#info-header {

}

#info-header .scan-label {

#info-name {

#back-btn button {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';

// ─── JARVIS BOOT SEQUENCE ────────────────────────────────────

const bootLines = [
  'LOADING NEURAL INTERFACE...',
  'CALIBRATING GESTURE RECOGNITION...',
  'INITIALIZING PINCH-ZOOM SUBSYSTEM...',
  'LOADING HIGH-RES TEXTURE MAPS...',
  'CONNECTING TO SATELLITE TRACKING...',
  'MAPPING STELLAR POSITIONS...',
  'INITIALIZING ATMOSPHERIC SHADERS...',
  'RENDERING HOLOGRAPHIC DISPLAY...',
  'ALL SYSTEMS NOMINAL'
];

const bootEl = document.getElementById('boot-text');
let bootIdx = 0;
function bootSequence() {
  if (bootIdx < bootLines.length) {
    bootEl.textContent += bootLines[bootIdx] + '\n';
    bootIdx++;
    setTimeout(bootSequence, 350);
  }
}
bootSequence();

// ─── JARVIS STATUS SYSTEM ────────────────────────────────────

const jarvisText = document.getElementById('jarvis-text');
const jarvisSub = document.getElementById('jarvis-sub');
let jarvisQueue = [];
let jarvisTyping = false;

function jarvisSay(text, sub, duration) {
  jarvisQueue.push({ text, sub: sub || '', duration: duration || 2500 });
  if (!jarvisTyping) processJarvisQueue();
}

function processJarvisQueue() {
  if (jarvisQueue.length === 0) { jarvisTyping = false; return; }
  jarvisTyping = true;
  const msg = jarvisQueue.shift();
  jarvisText.textContent = '';
  jarvisSub.textContent = msg.sub;
  let i = 0;
  const interval = setInterval(() => {
    if (i < msg.text.length) {
      jarvisText.textContent += msg.text[i];
      i++;
    } else {
      clearInterval(interval);
      setTimeout(processJarvisQueue, msg.duration);
    }
  }, 30);
}

function jarvisImmediate(text, sub) {
  jarvisQueue = [];
  jarvisText.textContent = text;
  jarvisSub.textContent = sub || '';
}

function hudFlash() {
  const flash = document.getElementById('flash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 150);
}

// ─── CONSTANTS & DATA ─────────────────────────────────────────

const AU = 40;
const SUN_RADIUS = 3;

// ─── GLSL NOISE (Ashima 3D Simplex) ──────────────────────────

const NOISE_GLSL = `
vec3 mod289v3(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289v4(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289v4(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);
  const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289v3(i);
  vec4 p=permute(permute(permute(
    i.z+vec4(0.0,i1.z,i2.z,1.0))
    +i.y+vec4(0.0,i1.y,i2.y,1.0))
    +i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;
  vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm(vec3 p){
  float v=0.0,a=0.5;
  for(int i=0;i<6;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}
  return v;
}
`;

// ─── THREE.JS SETUP ───────────────────────────────────────────

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 80, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 2500;
controls.enablePan = true;

// ─── POST-PROCESSING ─────────────────────────────────────────

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.8);

    varying vec2 vUv;
    float rand(vec2 co){ return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      vec2 dir = (vUv - 0.5) * u_caStrength;
      vec4 color;
      color.r = texture2D(tDiffuse, vUv + dir).r;
      color.g = texture2D(tDiffuse, vUv).g;
      color.b = texture2D(tDiffuse, vUv - dir).b;
      color.a = 1.0;
      vec2 uv = (vUv - 0.5) * 2.0;
      float vig = 1.0 - dot(uv, uv) * u_vigDarkness;
      color.rgb *= clamp(vig, 0.0, 1.0);
      float grain = rand(vUv + fract(u_time * 0.1)) * u_grainIntensity;
      color.rgb += grain - u_grainIntensity * 0.5;
      gl_FragColor = color;
    }
  `
});

function createStarfield(count, minR, maxR, size, opacity) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const r = minR + Math.random() * (maxR - minR);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const t = Math.random();
    if (t < 0.3) { col[i*3] = 0.7; col[i*3+1] = 0.8; col[i*3+2] = 1.0; }
    else if (t < 0.6) { col[i*3] = 1.0; col[i*3+1] = 1.0; col[i*3+2] = 1.0; }
    else if (t < 0.85) { col[i*3] = 1.0; col[i*3+1] = 0.95; col[i*3+2] = 0.7; }
    else { col[i*3] = 1.0; col[i*3+1] = 0.7; col[i*3+2] = 0.5; }
    sizes[i] = size * (0.5 + Math.random() * 1.5);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  // Use shader material for twinkling
  const mat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 }, u_size: { value: size }, u_opacity: { value: opacity } },
    vertexShader: `
      attribute vec3 color;
      varying vec3 vColor;
      varying float vTwinkle;
      uniform float u_time;
      uniform float u_size;
      void main() {
        vColor = color;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        // Twinkle based on position hash + time
        float hash = fract(sin(dot(position.xy, vec2(12.9898, 78.233))) * 43758.5453);
        vTwinkle = 0.6 + 0.4 * sin(u_time * (1.5 + hash * 3.0) + hash * 6.283);
        gl_PointSize = u_size * (0.5 + hash);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vTwinkle;
      uniform float u_opacity;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float a = (1.0 - d * d) * u_opacity * vTwinkle;
        gl_FragColor = vec4(vColor, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  return new THREE.Points(geo, mat);
}

function createBlackHole() {
  const group = new THREE.Group();
  // Sgr A* direction: RA=266.42 deg, Dec=-29.01 deg
  const raRad = 266.42 * DEG2RAD;
  const decRad = -29.01 * DEG2RAD;
  const dist = 2200;
  group.position.set(
    dist * Math.cos(decRad) * Math.cos(raRad),
    dist * Math.sin(decRad),
    dist * Math.cos(decRad) * Math.sin(raRad)
  );

  // Event horizon (dark sphere)
  const bhSize = 15;
  const eventHorizon = new THREE.Mesh(
    new THREE.SphereGeometry(bhSize, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  group.add(eventHorizon);

  // Accretion disk
  const diskGeo = new THREE.RingGeometry(bhSize * 1.5, bhSize * 5, 128, 16);
  const diskMat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      varying float vDist;
      void main() {
        vUv = uv;
        vDist = length(position.xy) / ${(bhSize * 5).toFixed(1)};
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float u_time;
      varying vec2 vUv;
      varying float vDist;
      void main() {
        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
        float t = fract(angle / 6.283 + u_time * 0.05);
        float bands = sin(t * 30.0 + vDist * 20.0) * 0.5 + 0.5;
        float inner = smoothstep(0.3, 0.5, vDist);
        float outer = 1.0 - smoothstep(0.7, 1.0, vDist);
        float a = inner * outer * 0.6;
        // Hot inner ring -> cooler outer
        vec3 hotColor = vec3(1.0, 0.8, 0.3);
        vec3 coolColor = vec3(1.0, 0.2, 0.05);
        vec3 col = mix(hotColor, coolColor, smoothstep(0.3, 0.9, vDist));
        col *= 0.7 + bands * 0.3;
        gl_FragColor = vec4(col, a);
      }
    `,
    transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = -Math.PI * 0.35;
  group.add(disk);

  // Gravitational lensing glow
  const lensGeo = new THREE.SphereGeometry(bhSize * 2.5, 32, 32);
  const lensMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewPos;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vViewPos = -(modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      varying vec3 vViewPos;
      void main() {
        float fresnel = pow(1.0 - abs(dot(vNormal, normalize(vViewPos))), 3.0);
        vec3 col = mix(vec3(0.8, 0.4, 0.0), vec3(1.0, 0.7, 0.2), fresnel);
        gl_FragColor = vec4(col, fresnel * 0.25);
      }
    `,
    transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Mesh(lensGeo, lensMat));

  // Label
  const lc = document.createElement('canvas'); lc.width = 512; lc.height = 64;
  const lx = lc.getContext('2d');
  lx.font = '24px Orbitron, sans-serif';
  lx.fillStyle = 'rgba(255,150,50,0.5)';
  lx.textAlign = 'center';
  lx.fillText('SAGITTARIUS A*', 256, 40);
  const ls = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true, depthTest: false }));
  ls.position.y = bhSize * 6;
  ls.scale.set(60, 8, 1);
  group.add(ls);

  group.userData = { diskMat };
  return group;
}

        float t = u_time * 0.04;

        float n2 = fbm(p + vec3(n1 * 0.6) + t * 0.3);
        float n = fbm(p + vec3(n2 * 0.8) + t * 0.1);
        vec3 c1 = vec3(0.8, 0.15, 0.0);
        vec3 c2 = vec3(1.0, 0.55, 0.05);
        vec3 c3 = vec3(1.0, 0.95, 0.7);
        float t1 = smoothstep(-0.3, 0.3, n);
        float t2 = smoothstep(0.15, 0.65, n);
        vec3 color = mix(c1, c2, t1);
        color = mix(color, c3, t2);
        color += vec3(1.0, 0.85, 0.5) * pow(max(n, 0.0), 4.0) * 0.7;
        gl_FragColor = vec4(color, 1.0);
      }
    `

  const mesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_RADIUS, 64, 64), sunMat);

          uniform float u_opacity, u_time;
          varying vec3 vNormal;
          varying vec3 vViewPos;
          ${NOISE_GLSL}
          void main() {
            float fresnel = pow(0.6 - dot(vNormal, normalize(vViewPos)), 2.0);
            fresnel = clamp(fresnel, 0.0, 1.0);
            float n = snoise(vNormal * 3.0 + u_time * 0.05) * 0.5 + 0.5;

          }
        `,
        transparent: true, side: THREE.BackSide, depthWrite: false, blending: THREE.AdditiveBlending
      })
    );
    g.add(corona);

  const c = document.createElement('canvas'); c.width = 512; c.height = 512;

    varying vec3 vPosW;
    void main() {
      vec3 sunDir = normalize(-vPosW);
      float NdL = dot(normalize(vNormalW), sunDir);
      float blend = smoothstep(-0.15, 0.25, NdL);
      vec3 dayColor;
      if (u_hasDay > 0.5) {
        dayColor = texture2D(u_day, vUv).rgb;
      } else {
        float lat = vUv.y;
        float lon = vUv.x;
        dayColor = vec3(0.15, 0.35, 0.65);
        float land = sin(lon * 12.0) * cos(lat * 8.0) * 0.5 + 0.5;
        if (land > 0.55) dayColor = mix(vec3(0.2, 0.45, 0.15), vec3(0.5, 0.4, 0.25), (land - 0.55) * 4.0);
      }
      vec3 nightColor = vec3(0.0);
      if (u_hasNight > 0.5) {
        nightColor = texture2D(u_night, vUv).rgb * 2.0;
      } else {
        nightColor = vec3(0.6, 0.5, 0.2) * 0.05;
      }
      float lighting = 0.15 + 0.85 * max(NdL, 0.0);
      vec3 color = mix(nightColor, dayColor * lighting, blend);
      gl_FragColor = vec4(color, 1.0);
    }
  `
});

function createOrbitLine(rAU, inc, col) {
  const pts = [];
  const r = rAU * AU;
  for (let i = 0; i <= 128; i++) { const a = (i/128)*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r)); }
  const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.12 }));
  line.rotation.x = THREE.MathUtils.degToRad(inc);
  return line;
}

function createLabel(text) {
  const c = document.createElement('canvas'); const x = c.getContext('2d');
  c.width = 256; c.height = 64;
  x.font = '20px Share Tech Mono, Courier New'; x.fillStyle = 'rgba(0,200,255,0.6)'; x.textAlign = 'center'; x.fillText(text.toUpperCase(), 128, 40);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  s.scale.set(8, 2, 1);
  return s;
}

function createRingMesh(size, iR, oR, col) {
  const geo = new THREE.RingGeometry(size * iR, size * oR, 128, 8);
  const ringCanvas = document.createElement('canvas');
  ringCanvas.width = 512; ringCanvas.height = 64;
  const ctx = ringCanvas.getContext('2d');
  const baseColor = new THREE.Color(col);
  for (let x = 0; x < 512; x++) {
    const t = x / 512;
    let opacity = 0.6;
    const gap1 = Math.abs(t - 0.35) < 0.02 ? 0 : 1;
    const gap2 = Math.abs(t - 0.62) < 0.015 ? 0 : 1;
    const density = (Math.sin(t * 40) * 0.3 + 0.7) * gap1 * gap2;
    opacity *= density;
    ctx.fillStyle = `rgba(${Math.floor(baseColor.r*255)},${Math.floor(baseColor.g*255)},${Math.floor(baseColor.b*255)},${opacity})`;
    ctx.fillRect(x, 0, 1, 64);
  }
  const ringTex = new THREE.CanvasTexture(ringCanvas);
  const mat = new THREE.MeshBasicMaterial({
    map: ringTex, transparent: true, side: THREE.DoubleSide, depthWrite: false, opacity: 0.7
  });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  return m;
}

function getPlanetSize(d) { return Math.max(0.3, Math.pow(d.radiusRatio, 0.4) * SIZE_SCALE * 3); }

// Compute real orbital angle from current date
function computeOrbitalAngle(data) {
  const days = daysSinceJ2000();
  const M0 = data.meanAnomalyJ2000 || 0;
  const n = 360 / data.periodDays; // mean motion deg/day
  const M = (M0 + n * days) % 360;
  return M * DEG2RAD;
}

    if (md.texFile) {
      loadTex(md.texFile, tex => { moonMat.map = tex; moonMat.needsUpdate = true; });
    }
    const moPts = [];
    for (let j = 0; j <= 64; j++) { const a = (j/64)*Math.PI*2; moPts.push(new THREE.Vector3(Math.cos(a)*mr, 0, Math.sin(a)*mr)); }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(moPts), new THREE.LineBasicMaterial({ color: 0x1a3040, transparent: true, opacity: 0.1 })));
  });

  const label = createLabel(data.name);
  label.position.y = size + 1.5;

  const orbitLine = createOrbitLine(data.orbitAU, data.inclination, data.color);
  scene.add(orbitLine);
  orbitLines.push(orbitLine);

  return group;
}

function initSatelliteCloud() {
  // Pre-create the point cloud with max satellite capacity
  const maxSats = 300;
  const geo = new THREE.BufferGeometry();
  satellitePositions = new Float32Array(maxSats * 3);
  const colors = new Float32Array(maxSats * 3);
  for (let i = 0; i < maxSats; i++) {
    colors[i*3] = 0.2; colors[i*3+1] = 0.8; colors[i*3+2] = 1.0;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(satellitePositions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setDrawRange(0, 0);

  const mat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 } },
    vertexShader: `
      attribute vec3 color;
      varying vec3 vColor;
      varying float vFlicker;
      uniform float u_time;
      void main() {
        vColor = color;
        float hash = fract(sin(dot(position.xy, vec2(12.98, 78.23))) * 43758.0);
        vFlicker = 0.6 + 0.4 * sin(u_time * 4.0 + hash * 6.28);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = max(2.0, 8.0 / -mvPos.z * 40.0);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vFlicker;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float a = (1.0 - d * d) * vFlicker;
        gl_FragColor = vec4(vColor * 1.5, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });

  satelliteMesh = new THREE.Points(geo, mat);
  scene.add(satelliteMesh);
}

// Fetch satellite TLE data from CelesTrak
async function fetchSatellites() {
  const groups = ['stations', 'visual'];
  const allTLEs = [];

  for (const group of groups) {
    try {
      const resp = await fetch(`https://celestrak.org/NORAD/elements/gp.php?GROUP=${group}&FORMAT=json`);
      if (resp.ok) {
        const data = await resp.json();
        data.forEach(sat => {
          if (sat.TLE_LINE1 && sat.TLE_LINE2) {
            allTLEs.push({ name: sat.OBJECT_NAME, line1: sat.TLE_LINE1, line2: sat.TLE_LINE2 });
          }
        });
      }
    } catch (e) {
      console.warn(`Failed to fetch ${group} satellites:`, e);
    }
  }

  // Also try last-30-days for recent launches
  try {
    const resp = await fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=last-30-days&FORMAT=json');
    if (resp.ok) {
      const data = await resp.json();
      data.slice(0, 50).forEach(sat => {
        if (sat.TLE_LINE1 && sat.TLE_LINE2) {
          allTLEs.push({ name: sat.OBJECT_NAME + ' [NEW]', line1: sat.TLE_LINE1, line2: sat.TLE_LINE2, recent: true });
        }
      });
    }
  } catch (e) {}

  if (allTLEs.length === 0) {
    // Fallback with embedded ISS TLE (may be stale but shows the concept)
    document.getElementById('sat-count').textContent = 'NO LIVE DATA — OFFLINE MODE';
    return;
  }

  // Parse TLEs
  const limit = Math.min(allTLEs.length, 300);
  satRecords = [];
  for (let i = 0; i < limit; i++) {
    try {
      const satrec = satLib.twoline2satrec(allTLEs[i].line1, allTLEs[i].line2);
      if (satrec) {
        satRecords.push({ satrec, name: allTLEs[i].name, recent: allTLEs[i].recent || false });
      }
    } catch (e) {}
  }

  // Set colors for recent launches
  const colAttr = satelliteMesh.geometry.getAttribute('color');
  satRecords.forEach((rec, i) => {
    if (rec.recent) {
      colAttr.array[i*3] = 1.0; colAttr.array[i*3+1] = 0.4; colAttr.array[i*3+2] = 0.2;
    } else if (rec.name.includes('ISS') || rec.name.includes('ZARYA')) {
      colAttr.array[i*3] = 0.0; colAttr.array[i*3+1] = 1.0; colAttr.array[i*3+2] = 0.5;
    }
  });
  colAttr.needsUpdate = true;
  satelliteMesh.geometry.setDrawRange(0, satRecords.length);

  document.getElementById('sat-count').textContent = `TRACKING ${satRecords.length} OBJECTS\nLIVE: CELESTRAK FEED`;
  jarvisSay(`${satRecords.length} SATELLITES LOCKED`, 'LIVE ORBITAL TRACKING ACTIVE', 2500);
}

function updateSatellitePositions() {
  if (satRecords.length === 0 || !satelliteMesh) return;

  // Find Earth's position in the scene
  const earthGroup = planetMeshes[2]; // Earth is index 2
  if (!earthGroup) return;
  const earthPos = earthGroup.position;
  earthSceneRadius = getPlanetSize(PLANET_DATA[2]);
  const scaleKmToScene = earthSceneRadius / EARTH_RADIUS_KM;

  const now = new Date();
  const gmst = satLib.gstime(now);

  const posAttr = satelliteMesh.geometry.getAttribute('position');

  for (let i = 0; i < satRecords.length; i++) {
    try {
      const pv = satLib.propagate(satRecords[i].satrec, now);
      if (!pv.position || pv.position === false) {
        posAttr.array[i*3] = 0; posAttr.array[i*3+1] = -9999; posAttr.array[i*3+2] = 0;
        continue;
      }

      // ECI coordinates in km
      const eciX = pv.position.x;
      const eciY = pv.position.y;
      const eciZ = pv.position.z;

      // Convert ECI to scene coordinates (relative to Earth center)
      // ECI: x=vernal equinox, y=90deg east, z=north pole
      // Scene: we map ECI directly, scaled
      const alt = Math.sqrt(eciX*eciX + eciY*eciY + eciZ*eciZ) - EARTH_RADIUS_KM;
      const exaggeratedAlt = alt < 2000 ? alt * SAT_ALT_EXAGGERATION : alt;
      const exaggeratedR = (EARTH_RADIUS_KM + exaggeratedAlt) * scaleKmToScene;
      const origR = Math.sqrt(eciX*eciX + eciY*eciY + eciZ*eciZ);
      const scale = exaggeratedR / origR;

      posAttr.array[i*3] = earthPos.x + eciX * scale * scaleKmToScene;
      posAttr.array[i*3+1] = earthPos.y + eciZ * scale * scaleKmToScene; // Z->Y (up)
      posAttr.array[i*3+2] = earthPos.z + eciY * scale * scaleKmToScene; // Y->Z
    } catch (e) {
      posAttr.array[i*3] = 0; posAttr.array[i*3+1] = -9999; posAttr.array[i*3+2] = 0;
    }
  }
  posAttr.needsUpdate = true;
}

function makeHand() {

    // Index finger tip for precise pointing
    indexTipX: 0.5, indexTipY: 0.5,
    smoothIndexX: 0.5, smoothIndexY: 0.5,
    // Thumb tip for pinch
    thumbTipX: 0.5, thumbTipY: 0.5
  };
}

const leftHand = makeHand(), rightHand = makeHand();
const twoHandMetrics = { gap: 0, prevGap: 0, gapDelta: 0, bothVisible: false, bothPinching: false, prevBothPinching: false, pinchGap: 0, prevPinchGap: 0 };
let handCount = 0, currentGesture = 'neutral', prevGesture = 'neutral', gestureHoldFrames = 0;
const GESTURE_TRIGGER_FRAMES = 8;
const orbitMomentum = { x: 0, y: 0 };
let zoomMomentum = 0;
let isPinchZooming = false;
let wasPointingBeforePinch = false;

function detectSingleHand(lm, hand) {
  const isUp = (t, p) => lm[t].y < lm[p].y;
  const thumbExt = Math.hypot(lm[4].x - lm[2].x, lm[4].y - lm[2].y) > 0.07;
  const idx = isUp(8,6), mid = isUp(12,10), rng = isUp(16,14), pnk = isUp(20,18);

  // Update pinch metrics
  hand.prevPinchDist = hand.pinchDist;
  hand.pinchDist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
  hand.wasPinching = hand.isPinching;
  hand.isPinching = hand.pinchDist < PINCH_THRESHOLD;
  hand.pinchStrength = Math.max(0, 1.0 - hand.pinchDist / 0.08);

  // Pinch midpoint
  hand.pinchMidX = (lm[4].x + lm[8].x) / 2;
  hand.pinchMidY = (lm[4].y + lm[8].y) / 2;

  // Index finger tip (for precise pointing)
  hand.indexTipX = lm[8].x;
  hand.indexTipY = lm[8].y;
  // Smooth the index tip position for stability
  const smoothF = 0.35;
  hand.smoothIndexX = hand.smoothIndexX * (1 - smoothF) + hand.indexTipX * smoothF;
  hand.smoothIndexY = hand.smoothIndexY * (1 - smoothF) + hand.indexTipY * smoothF;

  hand.thumbTipX = lm[4].x;
  hand.thumbTipY = lm[4].y;

  // Gesture classification
  if (hand.pinchDist < PINCH_SELECT_THRESHOLD) return 'purple'; // tight pinch = select
  if (hand.isPinching && !idx) return 'pinch_zoom'; // pinching without pointing = zoom
  if (idx && mid && rng && pnk && thumbExt) return 'openpalm';
  if (idx && !mid && !rng && !pnk && thumbExt) return 'gun';
  if (idx && !mid) return 'red'; // pointing
  if (hand.isPinching) return 'pinch_zoom'; // generic pinch = zoom
  if (!idx && !mid && !rng && !pnk) return 'fist';
  return 'neutral';
}

      drawLandmarks(canvasCtx, lm, { color: 'rgba(0,200,255,0.8)', lineWidth: 1, radius: 2 });

      // Highlight pinch points
      const pDist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
      if (pDist < PINCH_THRESHOLD) {
        const cx = ((lm[4].x + lm[8].x) / 2) * canvasElement.width;
        const cy = ((lm[4].y + lm[8].y) / 2) * canvasElement.height;
        canvasCtx.beginPath();
        canvasCtx.arc(cx, cy, 8, 0, Math.PI * 2);
        canvasCtx.strokeStyle = pDist < PINCH_SELECT_THRESHOLD ? 'rgba(0,255,150,0.8)' : 'rgba(0,200,255,0.8)';
        canvasCtx.lineWidth = 2;
        canvasCtx.stroke();
      }

      const hand = results.multiHandedness[i].label === 'Left' ? leftHand : rightHand;
      hand.prevPx = hand.px; hand.prevPy = hand.py; hand.prevAngle = hand.angle;
      hand.px = (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5;
      hand.py = (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5;
      hand.angle = Math.atan2(lm[9].y - lm[0].y, lm[9].x - lm[0].x);
      if (hand.lostFrames > 3) { hand.prevPx = hand.px; hand.prevPy = hand.py; hand.prevAngle = hand.angle; }
      const rdx = hand.px - hand.prevPx, rdy = hand.py - hand.prevPy, rda = hand.angle - hand.prevAngle;
      hand.smoothDpx = hand.smoothDpx * (1 - VELOCITY_SMOOTHING) + rdx * VELOCITY_SMOOTHING;
      hand.smoothDpy = hand.smoothDpy * (1 - VELOCITY_SMOOTHING) + rdy * VELOCITY_SMOOTHING;
      hand.smoothDAngle = hand.smoothDAngle * (1 - VELOCITY_SMOOTHING) + rda * VELOCITY_SMOOTHING;
      hand.dpx = Math.abs(hand.smoothDpx) > DEAD_ZONE ? hand.smoothDpx : 0;
      hand.dpy = Math.abs(hand.smoothDpy) > DEAD_ZONE ? hand.smoothDpy : 0;
      hand.dAngle = Math.abs(hand.smoothDAngle) > DEAD_ZONE * 2 ? hand.smoothDAngle : 0;
      const isUp = (t, p) => lm[t].y < lm[p].y;
      const tE = Math.hypot(lm[4].x - lm[2].x, lm[4].y - lm[2].y) > 0.07;
      hand.fingers = [tE, isUp(8,6), isUp(12,10), isUp(16,14), isUp(20,18)];
      hand.fingerCount = hand.fingers.filter(Boolean).length;
      hand.handSize = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y);
      hand.depth = THREE.MathUtils.clamp((hand.handSize - 0.12) / (0.35 - 0.12), 0, 1);
      hand.visible = true; hand.lostFrames = 0;
      hand.gesture = detectSingleHand(lm, hand);
    });
  }

  if (!leftHand.visible) { leftHand.lostFrames++; leftHand.dpx *= 0.8; leftHand.dpy *= 0.8; }
  if (!rightHand.visible) { rightHand.lostFrames++; rightHand.dpx *= 0.8; rightHand.dpy *= 0.8; }
  handCount = (leftHand.visible ? 1 : 0) + (rightHand.visible ? 1 : 0);

  // Two-hand metrics
  twoHandMetrics.prevBothPinching = twoHandMetrics.bothPinching;
  if (leftHand.visible && rightHand.visible) {
    twoHandMetrics.prevGap = twoHandMetrics.gap;
    twoHandMetrics.gap = Math.hypot(rightHand.px - leftHand.px, rightHand.py - leftHand.py);
    twoHandMetrics.gapDelta = twoHandMetrics.gap - twoHandMetrics.prevGap;
    twoHandMetrics.bothVisible = true;
    twoHandMetrics.bothPinching = leftHand.isPinching && rightHand.isPinching;

    // Track distance between pinch midpoints for two-hand zoom
    twoHandMetrics.prevPinchGap = twoHandMetrics.pinchGap;
    twoHandMetrics.pinchGap = Math.hypot(
      rightHand.pinchMidX - leftHand.pinchMidX,
      rightHand.pinchMidY - leftHand.pinchMidY
    );
  } else {
    twoHandMetrics.bothVisible = false;
    twoHandMetrics.bothPinching = false;
  }

  // Determine global gesture
  let detected = 'neutral';
  if (handCount === 2) {
    if (twoHandMetrics.bothPinching) {
      detected = 'pinch_zoom';
    } else {
      detected = leftHand.gesture !== 'neutral' ? leftHand.gesture : rightHand.gesture;
    }
  } else if (leftHand.visible) detected = leftHand.gesture;
  else if (rightHand.visible) detected = rightHand.gesture;

  if (detected === currentGesture) { gestureHoldFrames++; }
  else {
    // Track if we were pointing before pinch
    if (currentGesture === 'red' && (detected === 'purple' || detected === 'pinch_zoom')) {
      wasPointingBeforePinch = true;
    } else {
      wasPointingBeforePinch = false;
    }
    prevGesture = currentGesture;
    currentGesture = detected;
    gestureHoldFrames = 0;
  }

  // JARVIS status updates
  if (detected !== prevGesture) {
    if (detected === 'red') jarvisImmediate('SCANNING...', 'POINT TO IDENTIFY');
    else if (detected === 'purple') jarvisImmediate('TARGET ACQUIRED', 'ENGAGING...');
    else if (detected === 'pinch_zoom') jarvisImmediate('ZOOM CONTROL', 'PINCH TO ADJUST');
    else if (detected === 'openpalm') jarvisImmediate('DISENGAGING', 'RETURNING TO PREVIOUS VIEW');
    else if (detected === 'neutral' && handCount > 0) jarvisImmediate('NAVIGATION MODE', 'MOVE TO ORBIT');
    else if (handCount === 0) jarvisImmediate('STANDBY', 'AWAITING INPUT');
  }

  // HUD readout
  const readout = document.getElementById('hand-readout');
  if (handCount > 0) {
    const h = leftHand.visible ? leftHand : rightHand;
    const pinchStr = h.isPinching ? `PINCH: ${(h.pinchStrength * 100).toFixed(0)}%` : 'PINCH: OFF';
    readout.innerHTML = `HANDS: ${handCount} | ${pinchStr}<br>GESTURE: ${currentGesture.toUpperCase()}<br>VEL: ${(Math.abs(h.dpx) * 100).toFixed(1)} | ${(Math.abs(h.dpy) * 100).toFixed(1)}`;
  } else {
    readout.innerHTML = 'HANDS: 0 | STANDBY';
  }
});

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const infoPanel = document.getElementById('info-panel');
const crosshair = document.getElementById('crosshair');
const targetBrackets = document.getElementById('target-brackets');
const targetLabel = document.getElementById('target-label');
const targetDistEl = document.getElementById('target-dist');
const zoomIndicator = document.getElementById('zoom-indicator');

let selectedObject = null, focusTarget = null, cameraLookTarget = new THREE.Vector3();
let animatingToTarget = false, viewHistory = [];
let aimedObject = null, prevAimedName = '';
let palmTriggered = false, selectTriggered = false, gunTriggered = false;

// Improved: use index finger tip for pointing, with tighter detection
function findNearestToAim(hx, hy) {
  // Mirror x for camera view, convert to NDC
  const nx = -(hx * 2 - 1), ny = -(hy * 2 - 1);
  let nearest = null, nearestScore = Infinity;
  const wp = new THREE.Vector3();
  const sp = new THREE.Vector3();
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);

  allClickable.forEach(obj => {
    obj.getWorldPosition(wp);
    if (wp.clone().sub(camera.position).dot(camDir) < 0) return;
    sp.copy(wp).project(camera);
    if (Math.abs(sp.x) > 1.3 || Math.abs(sp.y) > 1.3) return;
    const screenDist = Math.hypot(sp.x - nx, sp.y - ny);
    const size = obj.userData.size || 0.3;
    const worldDist = camera.position.distanceTo(wp);
    // Tighter selection radius for precision
    const selRadius = Math.max(0.1, Math.max(0.06, (size / worldDist) * 4));
    if (screenDist < selRadius) {
      // Score: prefer closer screen distance, then closer world distance
      const score = screenDist * 1000 + worldDist * 0.01;
      if (score < nearestScore) { nearestScore = score; nearest = obj; }
    }
  });
  return nearest;
}

function showInfo(data) {
  document.getElementById('info-name').textContent = data.name;
  document.getElementById('info-type').textContent = data.type || '';
  const statsDiv = document.getElementById('info-stats');
  statsDiv.innerHTML = '';
  if (data.stats) {
    Object.entries(data.stats).forEach(([k, v]) => {
      statsDiv.innerHTML += `<div class="stat"><span class="label">${k}</span><span class="value">${v}</span></div>`;
    });
  }
  document.getElementById('info-facts').textContent = data.facts || '';
  const moonsDiv = document.getElementById('info-moons');
  moonsDiv.innerHTML = '';
  if (data.moons && data.moons.length > 0) {
    moonsDiv.innerHTML = `<h3>SATELLITES (${data.moons.length})</h3>`;
    data.moons.forEach(m => {
      const item = document.createElement('div');
      item.className = 'moon-item';
      item.textContent = `> ${m.name} — ${m.radiusKm.toLocaleString()} KM`;
      item.addEventListener('click', () => {
        const pp = planetMeshes.find(p => p.userData.planetData.name === data.name);
        if (pp) { const mm = pp.children.find(c => c.userData?.data?.name === m.name); if (mm) focusOnObject(mm, pp); }
      });
      moonsDiv.appendChild(item);
    });
  }
  infoPanel.style.display = 'block';
}

document.getElementById('close-btn').addEventListener('click', () => { infoPanel.style.display = 'none'; selectedObject = null; });

function focusOnObject(mesh, parent) {
  animatingToTarget = true;
  const wp = new THREE.Vector3(); mesh.getWorldPosition(wp);
  const ud = mesh.userData;
  const dist = ud.size ? ud.size * 8 + 5 : 10;
  focusTarget = { position: new THREE.Vector3(wp.x + dist * 0.5, wp.y + dist * 0.3, wp.z + dist), lookAt: wp.clone(), mesh, parent };
  if (ud.data) showInfo(ud.data);
  document.getElementById('back-btn').style.display = 'block';
  viewHistory.push({ pos: camera.position.clone(), target: controls.target.clone() });
  hudFlash();
  jarvisSay(`ANALYZING ${ud.data?.name || 'TARGET'}`, 'DISPLAYING TELEMETRY DATA', 2000);
}

function goBack() {
  if (viewHistory.length > 0) {
    const prev = viewHistory.pop();
    focusTarget = { position: prev.pos, lookAt: prev.target, mesh: null };
    animatingToTarget = true;
    infoPanel.style.display = 'none';
    selectedObject = null;
    if (viewHistory.length === 0) document.getElementById('back-btn').style.display = 'none';
    jarvisSay('DISENGAGED', 'RETURNING TO NAVIGATION', 1500);
  }
}

document.getElementById('back-button').addEventListener('click', goBack);

function setView(view) {
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  infoPanel.style.display = 'none'; selectedObject = null; viewHistory = [];
  document.getElementById('back-btn').style.display = 'none';

  else if (view === 'inner') { document.getElementById('btn-inner').classList.add('active'); focusTarget = { position: new THREE.Vector3(0, 25, 45), lookAt: new THREE.Vector3(0, 0, 0) }; }

}

renderer.domElement.addEventListener('click', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

// ─── ANIMATION LOOP ──────────────────────────────────────────

const clock = new THREE.Clock();
let satUpdateTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.elapsedTime;
  const activeHand = leftHand.visible ? leftHand : (rightHand.visible ? rightHand : null);

  // Update shader uniforms
  sunUniforms.u_time.value = elapsed;
  cinematicPass.uniforms.u_time.value = elapsed;
  starLayers.forEach(s => s.material.uniforms.u_time.value = elapsed);
  if (blackHole.userData.diskMat) blackHole.userData.diskMat.uniforms.u_time.value = elapsed;
  if (satelliteMesh) satelliteMesh.material.uniforms.u_time.value = elapsed;

  // ── POINTING with targeting brackets (uses index finger tip) ──
  if (currentGesture === 'red' && activeHand) {
    // Use smoothed index finger tip for precise pointing
    const sx = (1 - activeHand.smoothIndexX) * window.innerWidth;
    const sy = activeHand.smoothIndexY * window.innerHeight;
    crosshair.style.display = 'block';
    crosshair.style.left = sx + 'px';
    crosshair.style.top = sy + 'px';

    aimedObject = findNearestToAim(activeHand.smoothIndexX, activeHand.smoothIndexY);
    if (aimedObject) {
      const wp = new THREE.Vector3();
      aimedObject.getWorldPosition(wp);
      wp.project(camera);
      const bx = (wp.x * 0.5 + 0.5) * window.innerWidth;
      const by = (-wp.y * 0.5 + 0.5) * window.innerHeight;
      const sz = Math.max(50, (aimedObject.userData.size || 1) * 300 / camera.position.distanceTo(new THREE.Vector3().copy(aimedObject.getWorldPosition(new THREE.Vector3()))));

      targetBrackets.style.display = 'block';
      targetBrackets.style.left = bx + 'px';
      targetBrackets.style.top = by + 'px';
      targetBrackets.style.width = sz + 'px';
      targetBrackets.style.height = sz + 'px';
      targetBrackets.classList.add('locked');
      targetLabel.textContent = aimedObject.userData.data?.name || '';
      const distKm = (camera.position.distanceTo(new THREE.Vector3().copy(aimedObject.getWorldPosition(new THREE.Vector3()))) / AU * 149.6).toFixed(1);
      targetDistEl.textContent = distKm + 'M KM';

      if (aimedObject.userData.data?.name !== prevAimedName) {
        prevAimedName = aimedObject.userData.data?.name || '';
        jarvisImmediate('TARGET: ' + prevAimedName, 'PINCH TO ENGAGE');
      }
    } else {
      targetBrackets.style.display = 'none';
      targetBrackets.classList.remove('locked');
      prevAimedName = '';
    }
  } else {
    crosshair.style.display = 'none';
    targetBrackets.style.display = 'none';
    prevAimedName = '';
  }

  // ── PINCH SELECT (tight pinch while pointing at target) ──
  if (currentGesture === 'purple' && !selectTriggered) {
    selectTriggered = true;
    if (aimedObject) { selectedObject = aimedObject; focusOnObject(aimedObject); }
    else if (activeHand) {
      const t = findNearestToAim(activeHand.smoothIndexX, activeHand.smoothIndexY);
      if (t) { selectedObject = t; focusOnObject(t); }
    }
  }
  if (currentGesture !== 'purple') selectTriggered = false;

  // ── PINCH ZOOM (single hand or both hands) ──
  if (currentGesture === 'pinch_zoom' && !animatingToTarget) {
    zoomIndicator.style.display = 'block';

    if (twoHandMetrics.bothPinching && twoHandMetrics.prevBothPinching) {
      // Both hands pinch zoom: spreading hands = zoom in, contracting = zoom out
      const gapDelta = twoHandMetrics.pinchGap - twoHandMetrics.prevPinchGap;
      zoomMomentum += gapDelta * 500;
      zoomIndicator.querySelector('.zoom-icon').textContent = gapDelta > 0.002 ? '+' : (gapDelta < -0.002 ? '-' : '=');
      zoomIndicator.querySelector('.zoom-label').textContent = 'DUAL PINCH ZOOM';
    } else if (activeHand && activeHand.isPinching) {
      // Single hand pinch zoom: pinch delta controls zoom
      const pDelta = activeHand.prevPinchDist - activeHand.pinchDist;
      zoomMomentum += pDelta * 300;
      // Also use hand vertical movement while pinching for fine control
      zoomMomentum -= activeHand.dpy * 150;
      zoomIndicator.querySelector('.zoom-icon').textContent = pDelta > 0.002 ? '+' : (pDelta < -0.002 ? '-' : '=');
      zoomIndicator.querySelector('.zoom-label').textContent = 'PINCH ZOOM';
    }
  } else {
    zoomIndicator.style.display = 'none';
  }

  // ── GUN SELECT ──
  if (currentGesture === 'gun' && !gunTriggered && activeHand) {
    gunTriggered = true;
    const t = findNearestToAim(activeHand.smoothIndexX, activeHand.smoothIndexY);
    if (t) { selectedObject = t; focusOnObject(t); hudFlash(); }
  }
  if (currentGesture !== 'gun') gunTriggered = false;

  // ── OPEN PALM BACK ──
  if (currentGesture === 'openpalm' && !palmTriggered && gestureHoldFrames > GESTURE_TRIGGER_FRAMES) {
    palmTriggered = true; goBack();
  }
  if (currentGesture !== 'openpalm') palmTriggered = false;

  // ── CAMERA ORBIT (neutral hand movement) ──
  if (handCount > 0 && !animatingToTarget && currentGesture === 'neutral') {
    if (activeHand) {
      orbitMomentum.y += -activeHand.dpx * TORQUE_SCALE;
      orbitMomentum.x += activeHand.dpy * TORQUE_SCALE;
    }
  }

  // Two-hand orbit when not pinching
  if (handCount === 2 && !twoHandMetrics.bothPinching && !animatingToTarget && currentGesture !== 'pinch_zoom') {
    const avgDx = (leftHand.dpx + rightHand.dpx) / 2;
    const avgDy = (leftHand.dpy + rightHand.dpy) / 2;
    orbitMomentum.y += -avgDx * TORQUE_SCALE * 2;
    orbitMomentum.x += avgDy * TORQUE_SCALE * 2;
  }

  orbitMomentum.x *= FRICTION; orbitMomentum.y *= FRICTION; zoomMomentum *= 0.88;

  if (!animatingToTarget && (Math.abs(orbitMomentum.x) > 0.001 || Math.abs(orbitMomentum.y) > 0.001)) {
    const off = camera.position.clone().sub(controls.target);
    const sph = new THREE.Spherical().setFromVector3(off);
    sph.theta -= orbitMomentum.y * 0.01;
    sph.phi -= orbitMomentum.x * 0.01;
    sph.phi = THREE.MathUtils.clamp(sph.phi, 0.1, Math.PI - 0.1);
    off.setFromSpherical(sph);
    camera.position.copy(controls.target).add(off);
  }

  if (!animatingToTarget && Math.abs(zoomMomentum) > 0.01) {
    const dir = camera.position.clone().sub(controls.target).normalize();
    const dist = camera.position.distanceTo(controls.target);
    camera.position.copy(controls.target).add(dir.multiplyScalar(THREE.MathUtils.clamp(dist - zoomMomentum * 0.1, 2, 2500)));
  }

  // ── ORBIT PLANETS (real-time proportional speeds) ──
  planetMeshes.forEach((g, i) => {
    const d = PLANET_DATA[i];
    g.userData.angle += (2 * Math.PI) / (d.periodDays * 0.3) * dt;
    const e = d.eccentricity;
    // Simple elliptical orbit using mean anomaly -> true anomaly approximation
    const M = g.userData.angle;
    const trueAnomaly = M + 2 * e * Math.sin(M); // First-order Kepler approximation
    const r = d.orbitAU * AU * (1 - e * e) / (1 + e * Math.cos(trueAnomaly));
    g.position.x = Math.cos(trueAnomaly) * r;
    g.position.z = Math.sin(trueAnomaly) * r;

    // Planet self-rotation
    const rotSpeed = d.rotationHrs > 0 ? 0.3 / (d.rotationHrs / 24) : -0.3 / (-d.rotationHrs / 24);
    g.children[0].rotation.y += rotSpeed * dt;

    // Moon orbits
    g.children.forEach(c => {
      if (c.userData?.type === 'moon') {
        c.userData.angle += c.userData.speed;
        c.position.x = Math.cos(c.userData.angle) * c.userData.orbitRadius;
        c.position.z = Math.sin(c.userData.angle) * c.userData.orbitRadius;
      }
    });
  });

  // Earth cloud rotation
  if (earthCloudMesh) earthCloudMesh.rotation.y += 0.015 * dt;

  dwarfMeshes.forEach(m => {
    m.userData.angle += (2 * Math.PI) / (m.userData.periodDays * 0.3) * dt;
    m.position.x = Math.cos(m.userData.angle) * m.userData.orbitAU * AU;
    m.position.z = Math.sin(m.userData.angle) * m.userData.orbitAU * AU;
  });

  // Sun pulse
  sunGroup.children[0].scale.setScalar(1 + Math.sin(elapsed * 0.5) * 0.02);

  // Solar dust animation
  const dustPos = solarDust.geometry.attributes.position;
  const vel = solarDust.userData.vel;
  for (let i = 0; i < dustPos.count; i++) {
    dustPos.array[i*3] += vel[i*3];
    dustPos.array[i*3+1] += vel[i*3+1];
    dustPos.array[i*3+2] += vel[i*3+2];
    const r = Math.sqrt(dustPos.array[i*3]**2 + dustPos.array[i*3+1]**2 + dustPos.array[i*3+2]**2);
    if (r > 30 || r < 3.5) {
      const nr = 4 + Math.random() * 20;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      dustPos.array[i*3] = nr * Math.sin(phi) * Math.cos(theta);
      dustPos.array[i*3+1] = nr * Math.sin(phi) * Math.sin(theta) * 0.3;
      dustPos.array[i*3+2] = nr * Math.cos(phi);
    }
  }
  dustPos.needsUpdate = true;

  // ── UPDATE SATELLITE POSITIONS (every ~0.5 seconds for perf) ──
  satUpdateTimer += dt;
  if (satUpdateTimer > 0.5) {
    satUpdateTimer = 0;
    updateSatellitePositions();
  }

  // ── UPDATE SPACE PROBE POSITIONS (relative to planets) ──
  probeMeshes.forEach(pm => {
    const probe = pm.userData.probe;
    if (probe.nearEarth && planetMeshes[2]) {
      // JWST at L2: opposite Sun from Earth, ~0.01 AU beyond
      const ep = planetMeshes[2].position;
      const dir = ep.clone().normalize();
      pm.position.copy(ep).add(dir.multiplyScalar(0.4)); // Slightly beyond Earth
      pm.position.y += 0.2;
    } else if (probe.nearJupiter && planetMeshes[4]) {
      const jp = planetMeshes[4].position;
      pm.position.copy(jp);
      pm.position.x += 1.5; pm.position.y += 0.5;
    } else if (probe.nearMars && planetMeshes[3]) {
      const mp = planetMeshes[3].position;
      pm.position.copy(mp);
      const offset = probe.name.includes('Tianwen') ? 0.8 : -0.8;
      pm.position.x += offset; pm.position.y += 0.3;
    } else if (probe.nearMercury && planetMeshes[0]) {
      const mp = planetMeshes[0].position;
      pm.position.copy(mp);
      pm.position.x += 0.5; pm.position.y += 0.3;
    } else if (probe.nearSun) {
      // Parker Solar Probe: orbiting close to Sun
      const angle = elapsed * 0.3;
      pm.position.set(
        Math.cos(angle) * probe.distAU * AU,
        0.2,
        Math.sin(angle) * probe.distAU * AU
      );
    }
    // Rotate probe marker for visual interest
    pm.rotation.y += dt * 2;
    pm.rotation.x += dt * 0.5;
  });

  // Black hole accretion disk rotation
  if (blackHole.children[1]) blackHole.children[1].rotation.z += dt * 0.1;

  // ── CAMERA ANIMATION ──
  if (animatingToTarget && focusTarget) {
    const lf = 1 - Math.pow(0.05, dt);
    if (focusTarget.mesh) {
      const wp = new THREE.Vector3(); focusTarget.mesh.getWorldPosition(wp);
      focusTarget.lookAt.copy(wp);
      const sz = focusTarget.mesh.userData.size || 2;
      const d = focusTarget.mesh.userData.type === 'moon' ? (focusTarget.mesh.userData.orbitRadius || 2) * 0.4 + 2 : sz * 6 + 5;
      focusTarget.position.set(wp.x + d * 0.5, wp.y + d * 0.3, wp.z + d);
    }
    camera.position.lerp(focusTarget.position, lf);
    cameraLookTarget.lerp(focusTarget.lookAt, lf);
    controls.target.copy(cameraLookTarget);
    if (camera.position.distanceTo(focusTarget.position) < 0.5) animatingToTarget = false;
  }

  if (selectedObject && !animatingToTarget) {
    const wp = new THREE.Vector3(); selectedObject.getWorldPosition(wp);
    const off = camera.position.clone().sub(controls.target);
    controls.target.lerp(wp, 0.05);
    camera.position.copy(controls.target).add(off);
  }

  controls.update();
  composer.render();
}

// ─── RESIZE & INIT ───────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

setTimeout(() => {
  const ld = document.getElementById('loading');
  ld.style.opacity = '0';
  setTimeout(() => ld.style.display = 'none', 1000);
  jarvisSay('ALL SYSTEMS ONLINE', 'LIVE TRACKING ACTIVE | PHOTOREALISTIC RENDERING', 2500);
  setTimeout(() => jarvisSay('GESTURE CONTROLS ACTIVE', 'POINT TO SCAN | PINCH TO ZOOM | TIGHT PINCH TO SELECT | PALM TO DISENGAGE', 5000), 3000);
  setTimeout(() => jarvisSay(`${BRIGHT_STARS.length} NAMED STARS MAPPED`, 'REAL STELLAR POSITIONS LOADED', 2500), 9000);
}, 3500);

animate();

</script>
